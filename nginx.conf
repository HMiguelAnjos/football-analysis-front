server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Redirect domínio antigo do Railway → domínio oficial (301) ──
    # Qualquer host *.railway.app é redirecionado pro domínio oficial,
    # preservando path + query string ($request_uri).
    #   - 301 permanente (SEO + cache do browser).
    #   - Sem loop: o domínio oficial (clutchpro.nine6.com.br) NÃO casa
    #     com "railway.app".
    #   - Dev local não usa nginx (vite dev server) → não afeta.
    #   - CORS do backend já libera clutchpro.nine6.com.br.
    if ($host ~* "railway\.app") {
        return 301 https://clutchpro.nine6.com.br$request_uri;
    }

    # Proxy API through the same origin to avoid browser CORS restrictions.
    location /api/ {
        proxy_pass ${API_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle React Router (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # env.js must never be cached — it contains runtime config injected at container start
    location = /env.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
