         inicial do iOS/iPad. Quadrado 180×180 com fundo dark do tema. -->

    <meta name="theme-color" content="#111111" />
    <!-- iOS PWA: permite "Add to Home Screen" com título customizado.
         apple-mobile-web-app-capable habilita fullscreen quando aberto
         pelo ícone da tela inicial (sem barras do Safari). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ClutchPro Football" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
